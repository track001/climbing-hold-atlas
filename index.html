<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Climbing Hold Atlas</title>

  <style>
    :root {
      --bg: #0b1410;
      --card: #101c16;
      --muted: #9fb3a8;
      --text: #e6f2ec;
      --accent: #3aa76d;
      --accent-soft: #2e7d55;
      --border: #1f2d26;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b1410, #121f18);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 32px 20px;
    }

    h1 {
      margin-bottom: 6px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 12px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0e1813;
      color: var(--text);
    }

    input { flex: 1; }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .brand-title {
      font-size: 1.2rem;
      margin-bottom: 6px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .type {
      font-size: 0.8rem;
      color: #a8e6c3;
      margin-bottom: 10px;
    }

    .section-title {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #cfe8db;
    }

    ul {
      margin: 6px 0 0 16px;
      padding: 0;
    }

    a {
      color: #8ee0b7;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    select.file-dropdown {
      width: 100%;
      margin-top: 6px;
    }

  </style>
</head>

<body>
<div class="wrap">

  <h1>Climbing Hold Atlas</h1>
  <div class="sub">
    A living inventory of climbing holds, gear, and brands.
  </div>

  <div class="stats" id="stats"></div>

  <div class="controls">
    <input id="search" placeholder="Search..." />
    <select id="countryFilter">
      <option value="all">All countries</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>

async function load() {
  const brands = await fetch('./data/brands.json').then(r => r.json());
  const orders = await fetch('./data/orders.json').then(r => r.json());

  buildStats(brands, orders);
  buildFilter(brands);
  render(brands, orders);

  document.getElementById('search').oninput = () => render(brands, orders);
  document.getElementById('countryFilter').onchange = () => render(brands, orders);
}

function buildStats(brands, orders) {
  const countries = new Set(brands.map(b => b.headquarters?.country).filter(Boolean));

  document.getElementById('stats').innerHTML = `
    <div class="stat"><b>${brands.length}</b><br>Brands</div>
    <div class="stat"><b>${countries.size}</b><br>Countries</div>
    <div class="stat"><b>${orders.length}</b><br>Orders</div>
  `;
}

function buildFilter(brands) {
  const select = document.getElementById('countryFilter');
  const countries = [...new Set(brands.map(b => b.headquarters?.country).filter(Boolean))];

  countries.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}

function money(v, c) {
  if (v == null) return "Not tracked";
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: c || 'USD' }).format(v);
}

function render(brands, orders) {
  const search = document.getElementById('search').value.toLowerCase();
  const country = document.getElementById('countryFilter').value;

  const filtered = brands.filter(b => {
    const text = (b.name + b.type + b.notes + (b.headquarters?.country || "")).toLowerCase();
    return text.includes(search) &&
      (country === "all" || b.headquarters?.country === country);
  });

  document.getElementById('grid').innerHTML = filtered.map(brand => {

    const brandOrders = orders.filter(o => o.brand === brand.name && !o.hidden);

    return `
      <div class="card">
        <div class="brand-title">${brand.name}</div>
        <div class="meta">${brand.headquarters?.city || ""}, ${brand.headquarters?.country || ""}</div>
        <div class="type">${brand.type || ""}</div>

        <div class="section-title">Website</div>
        <a href="${brand.website}" target="_blank">${brand.website}</a>

        <div class="section-title">Orders</div>
        ${
          brandOrders.length
          ? `<ul>${brandOrders.map(o => `
              <li>${o.date || "No date"} — ${money(o.total, o.currency)}</li>
            `).join("")}</ul>`
          : "No orders"
        }

        ${
          brandOrders.map(o => o.delivery_timeline).filter(Boolean).length
          ? `
            <div class="section-title">Delivery</div>
            <ul>
              ${brandOrders.map(o => (o.delivery_timeline || []).map(d => `<li>${d}</li>`).join("")).join("")}
            </ul>
          `
          : ""
        }

        ${
          brand.files
          ? `
            <div class="section-title">Files</div>
            <select class="file-dropdown" onchange="if(this.value) window.open(this.value)">
              <option value="">Open file...</option>
              ${brand.files.map(f => `<option value="${f.url}">${f.label}</option>`).join("")}
            </select>
          `
          : ""
        }

        ${
          brand.contacts
          ? `<div class="section-title">Contacts</div>${brand.contacts.join(", ")}`
          : ""
        }

        ${
          brand.notes
          ? `<div class="section-title">Notes</div>${brand.notes}`
          : ""
        }

      </div>
    `;
  }).join("");
}

load();

</script>
</body>
</html>
